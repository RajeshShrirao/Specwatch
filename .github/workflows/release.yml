name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  homebrew:
    name: Homebrew Tap Update
    runs-on: ubuntu-latest
    needs: [release]
    steps:
      - name: Checkout Homebrew formula
        uses: dawidd6/action-homebrew-bump-formula@v3
        with:
          formula: specwatch
          token: ${{ secrets.HOMEBREW_TOKEN }}
